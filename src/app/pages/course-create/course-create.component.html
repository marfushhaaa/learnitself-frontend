<div class="page">
  <div class="form-card">

    <div class="form-card__header">
      <button class="btn btn--back" (click)="cancel()">
        ← Zurück
      </button>
      <h2>Neuen Kurs erstellen</h2>
    </div>

    @if (error() !== '') {
      <div class="error-msg">{{ error() }}</div>
    }

    <div class="form-group">
      <label>Kursname * ({{ course().name.length }}/40)</label>
      <input
        type="text"
        required
        maxlength="40"
        placeholder="z.B. Gitarre für Anfänger"
        [value]="course().name"
        (input)="onFieldChange('name', ($any($event.target)).value)"
      />
      @if (errors()['name']) {
         <span class="field-error">{{ errors()['name'] }}</span>
      }
    </div>

    <div class="form-group">
      <label>Beschreibung</label>
      <textarea
        placeholder="Worum geht es in diesem Kurs?"
        [value]="course().description"
        (input)="onFieldChange('description', ($any($event.target)).value)"
      ></textarea>
    </div>

    <div class="form-group">
      <label>Kategorie *</label>
      <select (change)="onCategoryChange(($any($event.target)).value)">
        <option value="">Kategorie wählen…</option>
        @for (cat of categories(); track cat.id) {
          <option [value]="cat.id">{{ cat.name }}</option>
        }
      </select>
      @if (errors()['category']) {
         <span class="field-error">{{ errors()['category'] }}</span>
      }
    </div>
   <div class="form-group">
      <label>Kurslänge (in Tage) *</label>
      <input
         type="number"
         placeholder="z.B. 10"
         min="1"
         required
         [value]="course().courseLength"
         (input)="onFieldChange('courseLength', ($any($event.target)).value)"
      />
      @if (errors()['courseLength']) {
         <span class="field-error">{{ errors()['courseLength'] }}</span>
      }
   </div>

    <div class="form-actions">
      <button class="btn btn-outline" (click)="cancel()">Abbrechen</button>
      <button class="btn btn-primary" (click)="submit()" [disabled]="isLoading()">
        @if (isLoading()) {
          Wird erstellt…
        } @else {
          Kurs erstellen
        }
      </button>
    </div>

  </div>
</div>
